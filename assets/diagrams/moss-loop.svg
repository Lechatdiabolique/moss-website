<text x="320" y="83" fill="#7E858E" font-size="10.5" text-anchor="middle">find and fix legacy crypto</text>
</g>
<g>
<rect x="430" y="300" width="170" height="78" rx="5" fill="#1E2126" stroke="#252830"/>
<text x="515" y="332" fill="#fff" font-size="15" font-weight="700" text-anchor="middle" font-family="Archivo,sans-serif">Trust</text>
