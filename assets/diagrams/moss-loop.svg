<!-- arrows forming the loop -->
<path d="M392 100 C 470 150, 520 230, 518 296" fill="none" stroke="#A8C090" stroke-width="1.5" marker-end="url(#al)"/>
<path d="M430 345 L 214 345" fill="none" stroke="#A8C090" stroke-width="1.5" marker-end="url(#al)"/>
